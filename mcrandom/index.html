<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fachestudios.com/mcrandom</title>
  <link rel="canonical" href="https://fachestudios.com/mcrandom/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player {
      width: 100%;
      max-width: 1000px;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      cursor: pointer;
    }

    .controls {
      background: #1a1a1a;
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-wrap {
      width: 100%;
      height: 4px;
      background: #555;
      cursor: pointer;
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      pointer-events: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .time {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
    }

    .spacer { flex: 1; }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 70px;
      height: 3px;
      background: #888;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
    }

    .speed-select {
      background: none;
      border: 1px solid #555;
      color: #ddd;
      font-size: 12px;
      font-family: Arial, sans-serif;
      padding: 2px 4px;
      border-radius: 3px;
      cursor: pointer;
      outline: none;
    }
    .speed-select option { background: #222; }
  </style>
</head>
<body>

  <div class="player">
    <video id="vid" preload="metadata">
      <source src="final_editmp_.mp4" type="video/mp4" />
    </video>

    <div class="controls">
      <div class="progress-wrap" id="progWrap">
        <div class="progress-fill" id="progFill"></div>
      </div>

      <div class="row">
        <button class="btn" id="playBtn">
          <svg id="iPlay" width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iPause" width="20" height="20" viewBox="0 0 24 24" fill="#fff" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <span class="time" id="timeDisp">0:00 / 0:00</span>

        <div class="spacer"></div>

        <div class="vol-wrap">
          <button class="btn" id="muteBtn">
            <svg id="iVol" width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg id="iMute" width="20" height="20" viewBox="0 0 24 24" fill="#fff" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
          </button>
          <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" />
        </div>

        <select class="speed-select" id="speedSel">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>Normal</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>

        <button class="btn" id="fsBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const vid = document.getElementById('vid');
    const iPlay = document.getElementById('iPlay');
    const iPause = document.getElementById('iPause');
    const iVol = document.getElementById('iVol');
    const iMute = document.getElementById('iMute');
    const volSlider = document.getElementById('volSlider');
    const progWrap = document.getElementById('progWrap');
    const progFill = document.getElementById('progFill');
    const timeDisp = document.getElementById('timeDisp');

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
    }

    document.getElementById('playBtn').onclick = () => vid.paused ? vid.play() : vid.pause();
    vid.onclick = () => vid.paused ? vid.play() : vid.pause();
    vid.addEventListener('play',  () => { iPlay.style.display='none'; iPause.style.display=''; });
    vid.addEventListener('pause', () => { iPlay.style.display='';     iPause.style.display='none'; });

    vid.addEventListener('timeupdate', () => {
      if (!vid.duration) return;
      progFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
      timeDisp.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
    });

    progWrap.addEventListener('click', e => {
      const r = progWrap.getBoundingClientRect();
      vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
    });

    volSlider.oninput = () => { vid.volume = volSlider.value; vid.muted = +volSlider.value === 0; syncMute(); };
    document.getElementById('muteBtn').onclick = () => { vid.muted = !vid.muted; syncMute(); };
    function syncMute() {
      const m = vid.muted || vid.volume === 0;
      iVol.style.display = m ? 'none' : ''; iMute.style.display = m ? '' : 'none';
    }

    document.getElementById('speedSel').onchange = e => { vid.playbackRate = +e.target.value; };

    document.getElementById('fsBtn').onclick = () => {
      document.fullscreenElement ? document.exitFullscreen() : document.querySelector('.player').requestFullscreen();
    };
  </script>
</body>
</html>
