<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini Omni</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #e8a84c;
      --gold-light: #f5c97a;
      --white: #ffffff;
      --bg: #050508;
      --glow: rgba(232, 168, 76, 0.35);
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Google Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── HERO IMAGE ── */
    .hero {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero img {
      width: 100%;
      display: block;
      border-radius: 0 0 2px 2px;
      animation: fadeIn 1.2s ease both;
    }

    /* subtle bottom vignette so content flows into the page */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, var(--bg));
      pointer-events: none;
    }

    /* ── CONTENT CARD ── */
    .card {
      width: 100%;
      max-width: 700px;
      margin: -40px auto 60px;
      padding: 48px 52px;
      text-align: center;
      position: relative;
      z-index: 2;
      animation: riseUp 1s 0.3s ease both;
    }

    /* ── ✏️  EDITABLE HEADLINE — change here ── */
    .headline {
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--white) 30%, var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }

    /* ── ✏️  EDITABLE SUBTEXT — change here ── */
    .subtext {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      line-height: 1.7;
      max-width: 540px;
      margin: 0 auto 40px;
    }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.25s ease both;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: linear-gradient(145deg, #12121e, #1c1c2e);
      border: 1px solid rgba(232,168,76,0.3);
      border-radius: 20px;
      padding: 44px 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(232,168,76,0.15), 0 20px 60px rgba(0,0,0,0.6);
      animation: riseUp 0.35s ease both;
      position: relative;
    }

    .modal-icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
      display: block;
    }

    .modal-title {
      font-family: 'Google Sans Display', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
    }

    .modal-msg {
      font-size: 1rem;
      color: rgba(255,255,255,0.68);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .modal-msg strong {
      color: var(--gold-light);
      font-weight: 600;
    }

    .modal-close {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 34px;
      border-radius: 999px;
      border: 1.5px solid rgba(232,168,76,0.5);
      background: transparent;
      color: var(--gold-light);
      font-family: 'Google Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .modal-close:hover {
      background: rgba(232,168,76,0.12);
      border-color: var(--gold-light);
      transform: translateY(-2px);
    }

    /* ── CTA BUTTON ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-family: 'Google Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #0d0d14;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
      box-shadow: 0 0 32px var(--glow), 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      text-decoration: none;
    }

    .cta:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 0 56px var(--glow), 0 8px 28px rgba(0,0,0,0.5);
      filter: brightness(1.08);
    }

    .cta:active {
      transform: translateY(0) scale(0.98);
    }

    .cta svg {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
